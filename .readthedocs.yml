---
version: 2

build:
    os: ubuntu-24.04
    tools:
        python: "3.13"
    # libclang lets the docs build dogfood clangquill on its own C++ headers;
    # sqlite/nlohmann are the core's build dependencies. If libclang is ever
    # unavailable the extension degrades to a placeholder rather than failing.
    apt_packages:
        - libclang-dev
        - libsqlite3-dev
        - nlohmann-json3-dev

python:
    install:
        - method: pip
          path: .
          extra_requirements:
              - docs

sphinx:
    builder: html
    fail_on_warning: true
