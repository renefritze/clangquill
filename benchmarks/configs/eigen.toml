# Eigen — header-only linear algebra library (hosted on GitLab).
# Heavily templated; a great stress test for the libclang parser. Pinned to the
# 3.4.0 release tag for reproducibility.
name = "eigen"
repo = "https://gitlab.com/libeigen/eigen.git"
ref = "3.4.0"
std = "c++17"
include_dirs = ["."]
# Recursive glob so clangquill covers the same tree Doxygen scans (arch/,
# functors/, products/, util/ — not just the top-level Core headers);
# FILE_PATTERNS keeps Doxygen on the identical file set.
inputs = ["Eigen/src/Core/**/*.h"]
doxygen_input = ["Eigen/src/Core"]
doxygen_file_patterns = ["*.h"]

[patch]
files = ["Eigen/src/Core/Matrix.h"]
