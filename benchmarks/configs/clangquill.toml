# This repository, benchmarked against its own C++ IR/parser/store headers.
# `local = true` uses the current working tree directly (no clone), mirroring the
# self-documentation set in docs/conf.py.
name = "clangquill"
local = true
std = "c++20"
include_dirs = ["src/cpp"]
# Recursive glob over every header; FILE_PATTERNS restricts Doxygen to the same
# *.hpp set (it would otherwise also lex the .cpp implementation files, doing
# work clangquill is never asked to do).
inputs = ["src/cpp/**/*.hpp"]
doxygen_input = ["src/cpp"]
doxygen_file_patterns = ["*.hpp"]

[patch]
files = ["src/cpp/model/symbol.hpp"]
# A header no other input includes, so the incremental-leaf scenario
# re-parses a single translation unit.
leaf_files = ["src/cpp/core/version.hpp"]
