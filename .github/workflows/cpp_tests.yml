---
name: cpp-tests

on:
    push:
        branches:
            - main
    merge_group:
    pull_request:
        branches:
            - main

jobs:
    ctest:
        name: C++ unit tests
        runs-on: ubuntu-24.04
        steps:
            - uses: actions/checkout@v6
            - name: Install dependencies
              run: |
                  sudo apt-get update
                  sudo apt-get install -y --no-install-recommends \
                    cmake ninja-build libclang-dev libsqlite3-dev \
                    nlohmann-json3-dev catch2
            - name: Set up Python
              uses: actions/setup-python@v6
              with:
                  python-version: '3.13'
            - name: Install nanobind (build-time dependency)
              run: python -m pip install nanobind
            - name: Configure
              run: >-
                  cmake -S . -B build -G Ninja
                  -DCLANGQUILL_WITH_LIBCLANG=ON
                  -DCLANGQUILL_BUILD_TESTS=ON
                  -DPython_EXECUTABLE=$(which python)
            - name: Build
              run: cmake --build build
            - name: Test
              run: ctest --test-dir build --output-on-failure
