---
# Exercise the ClangQuill-vs-Doxygen benchmark harness and publish the results
# into the docs. Runs on version tags (`v*`) and on manual dispatch; a tagged
# run (or a manual dispatch with `publish_docs` enabled) regenerates
# docs/benchmarks.md and opens a pull request against main with the refreshed
# numbers, so the published page can be brought up to date with main without
# waiting for the next release. By default it benchmarks every repo configured
# under benchmarks/configs/ (the external ones are cloned blobless); a manual
# run can narrow the scope via the `repos` input.
name: benchmark
on:
  push:
    tags: [v*]
  workflow_dispatch:
    inputs:
      repos:
        description: Comma-separated repo configs to narrow scope (empty = every config
          under benchmarks/configs/)
        default: ''
      tools:
        description: Stages to run
        default: clangquill-myst,clangquill-sphinx,doxygen-xml,doxygen-html
      repeat:
        description: Recorded repetitions per scenario
        default: '3'
      warmup:
        description: Un-recorded warmup repetitions
        default: '1'
      publish_docs:
        description: Also regenerate docs/benchmarks.md from this run and open the
          docs PR against main (otherwise the run only reports its results)
        type: boolean
        default: false
# One benchmark run per ref at a time; a newer push cancels an in-flight run so
# results are not interleaved and runners are not wasted.
concurrency:
  group: benchmark-${{ github.ref }}
  cancel-in-progress: true
jobs:
  benchmark:
    runs-on: ubuntu-24.04
    # The docs-update branch push and PR are performed with the minted GitHub
    # App token (see the step below), not the default GITHUB_TOKEN, so the job
    # itself only needs read access to check out the repo.
    permissions:
      contents: read
    steps:
      - name: Mint GitHub App token
        # Open the docs PR as the benchmark GitHub App rather than with the
        # default GITHUB_TOKEN. A PR created with GITHUB_TOKEN cannot trigger
        # other workflows (GitHub suppresses recursive runs), so the docs PR's
        # CI would never start; an App installation token sidesteps that and
        # also attributes the PR to the App instead of github-actions[bot].
        # Gated to publishing runs (tags, or a dispatch that opted in via
        # publish_docs) by the `if` below: other dispatch runs skip both this
        # step and the PR step, so the token is only minted when it is used.
        id: app-token
        if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch'
          && inputs.publish_docs)
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1  # v3.2.0
        with:
          # The client ID is not secret; the private key is stored as a repo
          # secret. (client-id supersedes the now-deprecated app-id input.)
          client-id: Iv23lit0Lli91kLFjRED
          private-key: ${{ secrets.BENCHMARK_APP_PRIVATE_KEY }}
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          # The harness only does local git ops and create-pull-request uses its
          # own token, so don't persist the checkout credentials.
          persist-credentials: false
      - name: Install doxygen
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends doxygen
      - name: Install build dependencies (LLVM 22 + system libs)
        # The benchmark must measure the code being tagged, not a previously
        # published wheel, so the core is built from this checkout. LLVM 22 from
        # apt.llvm.org matches the libclang major bundled into release wheels
        # (the distro libclang is older and would skew parse coverage/timings).
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 22
          sudo apt-get install -y --no-install-recommends \
            libclang-22-dev llvm-22-dev libsqlite3-dev nlohmann-json3-dev
      - name: Install uv
        uses: astral-sh/setup-uv@f98e06938123ccabd21905ea5d0069192241f9f1  # v8.3.1
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: '3.13'
      - name: Install benchmark dependencies (checkout build + sphinx + myst)
        # benchmarks/ is a standalone uv project; sync pulls sphinx/myst (and the
        # locked clangquill wheel as a placeholder), then the wheel is replaced
        # with a build of the checked-out source so the published numbers track
        # the commit they are labeled with. The assert fails fast if the core
        # silently linked against an older distro libclang, and the version the
        # checkout build installed is recorded so the run step can verify the
        # benchmark actually measures it (see below).
        env:
          SKBUILD_CMAKE_DEFINE: CLANGQUILL_WITH_LIBCLANG=ON;LibClang_ROOT=/usr/lib/llvm-22
        run: |
          uv sync --frozen --project benchmarks
          uv pip install --python benchmarks/.venv/bin/python --reinstall-package clangquill .
          benchmarks/.venv/bin/python -c "from clangquill._libclang import libclang_major; assert (libclang_major() or 0) >= 22, libclang_major()"
          built=$(benchmarks/.venv/bin/python -c "import importlib.metadata as m; print(m.version('clangquill'))")
          echo "Built clangquill $built from the checkout"
          echo "CLANGQUILL_BUILT_VERSION=$built" >> "$GITHUB_ENV"
      - name: Run benchmark
        # `uv run` puts the project's venv bin on PATH, so the harness resolves
        # `clangquill` and `sphinx-build` by name; `doxygen` comes from apt.
        # `--no-sync` is load-bearing: without it `uv run` re-syncs the project
        # environment to benchmarks/uv.lock, silently replacing the checkout
        # build with the locked PyPI wheel — which is why every previously
        # published run reported `clangquill 0.2.0` regardless of the tag it ran
        # on. The version check makes that failure loud instead of silent: the
        # environment must still hold exactly the build the install step made.
        # Dispatch inputs are passed via env (not interpolated into the script)
        # so they can never expand into executable shell.
        env:
          # Empty by default so the harness benchmarks every config under
          # benchmarks/configs/; a dispatch can pass a subset to narrow scope.
          BENCH_REPOS: ${{ inputs.repos }}
          BENCH_TOOLS: ${{ inputs.tools || 'clangquill-myst,clangquill-sphinx,doxygen-xml,doxygen-html' }}
          BENCH_REPEAT: ${{ inputs.repeat || '3' }}
          BENCH_WARMUP: ${{ inputs.warmup || '1' }}
        run: |
          actual=$(benchmarks/.venv/bin/python -c "import importlib.metadata as m; print(m.version('clangquill'))")
          if [ "$actual" != "$CLANGQUILL_BUILT_VERSION" ]; then
            echo "benchmarks venv holds clangquill $actual, not the checkout build $CLANGQUILL_BUILT_VERSION — refusing to benchmark the wrong binary" >&2
            exit 1
          fi
          # Sample memory and disk in the background: post-v0.8.1 runs have died
          # with "runner received a shutdown signal" mid-benchmark, which on
          # hosted runners usually means the VM was resource-killed. The samples
          # are surfaced in the job summary below so the next failure says when
          # and what was exhausted instead of nothing.
          # tee'd into the step's own stdout as well as the file: a runner that
          # is torn down mid-benchmark never runs the always() summary step, so
          # the streamed copy in the live log is the only record that survives.
          ( while true; do
              echo "$(date -u +%H:%M:%S) mem_used_mb=$(free -m | awk '/Mem:/ {print $3}') disk_avail_mb=$(df -m --output=avail / | tail -1 | tr -d ' ')"
              sleep 15
            done | tee /tmp/resource-monitor.log &
            echo "$!" > /tmp/resource-monitor.pid )
          # -u keeps the harness's per-repo/per-stage progress lines unbuffered:
          # python block-buffers stdout on a pipe, so a killed run used to leave
          # no trace of how far it got in the CI log.
          #
          # nice -n 10 keeps the runner agent responsive: measuring the real
          # binary saturates all four vCPUs continuously for ~20 minutes
          # (parallel libclang parse, sphinx -j auto, doxygen all-threads),
          # and three full runs in a row were torn down with "runner has
          # received a shutdown signal" ~18-20 min in, while a short run of the
          # same workload completes — consistent with the agent starving under
          # sustained load. Deprioritising the benchmark only matters when
          # something else (the agent) wants CPU, so on an otherwise-idle
          # runner the measured numbers are unaffected.
          nice -n 10 uv run --no-sync --project benchmarks python -u benchmarks/benchmark.py \
            --repos "$BENCH_REPOS" \
            --tools "$BENCH_TOOLS" \
            --repeat "$BENCH_REPEAT" \
            --warmup "$BENCH_WARMUP"
      - name: Publish results to job summary
        if: always()
        run: |
          # The sampler has served its purpose once the benchmark step is over;
          # stop it so it does not linger through the remaining steps.
          if [ -f /tmp/resource-monitor.pid ]; then
            kill "$(cat /tmp/resource-monitor.pid)" 2>/dev/null || true
          fi
          # Resource-monitor tail and kernel OOM traces first: when the runner
          # is torn down mid-benchmark this is the evidence of what happened.
          if [ -f /tmp/resource-monitor.log ]; then
            {
              echo '### Resource monitor (last 20 samples)'
              echo '```'
              tail -20 /tmp/resource-monitor.log
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          fi
          if sudo dmesg 2>/dev/null | grep -iE 'out of memory|oom-kill' | tail -5 | grep -q .; then
            {
              echo '### Kernel OOM traces'
              echo '```'
              sudo dmesg | grep -iE 'out of memory|oom-kill' | tail -5
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          fi
          # The benchmark step may have failed before creating results/, so guard
          # the directory before scanning it (this always() step must not fail).
          if [ ! -d benchmarks/results ]; then
            echo "No benchmark results were produced." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          # Result files are named with a sortable UTC timestamp, so the last
          # one lexicographically is the newest. (find/sort avoids parsing `ls`.)
          latest=$(find benchmarks/results -maxdepth 1 -name '*.md' | sort | tail -1)
          if [ -n "$latest" ]; then
            cat "$latest" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No benchmark results were produced." >> "$GITHUB_STEP_SUMMARY"
          fi
      - name: Upload results artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: benchmark-results
          path: benchmarks/results/
          if-no-files-found: ignore
      - name: Update docs benchmark page
        # Publish on a version tag, or on a manual dispatch that opted in via
        # publish_docs (so the public numbers can be refreshed from main between
        # releases); any other dispatch just runs the benchmark without touching
        # the docs.
        if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch'
          && inputs.publish_docs)
        run: |
          latest=$(find benchmarks/results -maxdepth 1 -name '*.md' | sort | tail -1)
          if [ -z "$latest" ]; then
            echo "No benchmark results to publish to docs." >&2
            exit 0
          fi
          # Replace the page body with the freshly rendered report, keeping a
          # stable "Benchmarks" title (drop the report's own top-level heading).
          {
            echo "<!-- AUTO-GENERATED by .github/workflows/benchmark.yml — do not edit by hand. -->"
            echo
            echo "# Benchmarks"
            tail -n +2 "$latest"
          } > docs/benchmarks.md
      - name: Lint generated docs with pre-commit
        # Run the repo's pre-commit hooks against the freshly generated page so
        # the commit opened below is already clean — the same hooks gate every
        # PR, including this docs PR. The fixer hooks (trailing-whitespace,
        # end-of-file-fixer, …) may rewrite the file and exit non-zero on the
        # first pass, so swallow that, then re-run to assert the result is
        # actually clean and fail the job on any remaining (unfixable) error.
        if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch'
          && inputs.publish_docs)
        run: |
          uvx pre-commit run --files docs/benchmarks.md --color=always || true
          uvx pre-commit run --files docs/benchmarks.md --color=always
      - name: Open docs update PR against main
        if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch'
          && inputs.publish_docs)
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1  # v8.1.1
        with:
          # The minted App installation token, so the PR is opened by the
          # benchmark App and is able to trigger downstream CI workflows.
          token: ${{ steps.app-token.outputs.token }}
          base: main
          branch: bot/benchmark-results
          add-paths: docs/benchmarks.md
          commit-message: 'docs: refresh benchmark results'
          title: 'docs: refresh benchmark results'
          body: |
            Automated benchmark run — regenerated `docs/benchmarks.md` from the
            latest `benchmark` workflow run.
          delete-branch: true
