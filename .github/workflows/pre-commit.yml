---
name: pre-commit
on: [pull_request]
jobs:
  pre-commit:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.2
      - name: Set up Python
        uses: actions/setup-python@v6.3.0
        with:
          python-version: '3.13'
      - name: Run pre-commit
        run: uvx pre-commit run --all-files --show-diff-on-failure --color=always
