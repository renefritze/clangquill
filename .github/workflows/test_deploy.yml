---
# Build the package on every PR; publish to Test PyPI only on pushes to main or
# version tags (so PRs verify the build without needing a publish token).

name: test-deploy

on:
    pull_request:
    push:
        branches:
            - main
        tags:
            - v*

jobs:
    deploy:

        runs-on: ubuntu-latest

        permissions:
            id-token: write

        steps:
            - uses: actions/checkout@v6
              with:
                  # full history so setuptools_scm derives the version
                  fetch-depth: 0
            - name: Set up Python
              uses: actions/setup-python@v6
              with:
                  python-version: 3.x
            - name: Build sdist
              run: |
                  python -m pip install --upgrade pip
                  pip install build
                  python -m build --sdist --outdir dist/
            - name: Build manylinux wheels
              # A plain `python -m build --wheel` tags the artefact
              # linux_x86_64, which PyPI rejects. cibuildwheel produces the
              # manylinux-tagged wheels PyPI accepts.
              uses: pypa/cibuildwheel@v3.4
              env:
                  CIBW_BUILD: cp311-* cp312-* cp313-*
                  CIBW_SKIP: '*-musllinux*'
                  CIBW_ARCHS_LINUX: x86_64
                  CIBW_BUILD_VERBOSITY: '1'
                  CIBW_TEST_COMMAND: >-
                      python -c "from clangquill import _core;
                      print(_core.__core_version__, _core.have_libclang())"
              with:
                  output-dir: dist
            - name: Publish distribution 📦 to Test PyPI
              if: github.event_name == 'push'
              uses: pypa/gh-action-pypi-publish@release/v1
              with:
                  user: __token__
                  password: ${{ secrets.TEST_PYPI_TOKEN }}
                  repository-url: https://test.pypi.org/legacy/
