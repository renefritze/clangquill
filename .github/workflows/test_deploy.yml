---
# Build the package on every PR; publish to Test PyPI only on pushes to main or
# version tags (so PRs verify the build without needing a publish token).

name: test-deploy

on:
    pull_request:
    push:
        branches:
            - main
        tags:
            - v*

jobs:
    deploy:

        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v6
              with:
                  # to guarantee proper hatch-vcs pickup of the last tag
                  fetch-depth: 0
            - name: Set up Python
              uses: actions/setup-python@v6
              with:
                  python-version: 3.x
            - name: Build dist artefacts
              run: |
                  python -m pip install --upgrade pip
                  pip install build
                  python -m build --sdist --wheel --outdir dist/
            - name: Publish distribution 📦 to Test PyPI
              if: github.event_name == 'push'
              uses: pypa/gh-action-pypi-publish@release/v1
              with:
                  user: __token__
                  password: ${{ secrets.TEST_PYPI_TOKEN }}
                  repository-url: https://test.pypi.org/legacy/
