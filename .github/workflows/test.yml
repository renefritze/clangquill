---
on:
  push:
    branches:
    - main
  merge_group:
  pull_request:
    branches:
    - main

name: pytest
jobs:
  py-check:
    runs-on: ${{ matrix.config.os }}
    name: ${{ matrix.config.os }} (${{ matrix.config.py }})
    strategy:
      fail-fast: false
      matrix:
        config:
        - {os: ubuntu-24.04, py: '3.13'}

    env:
      OS: ${{ matrix.config.os }}
      PYTHON: ${{ matrix.config.py }}
    steps:
    - name: Cancel Previous Runs
      uses: styfle/cancel-workflow-action@0.13.1
      with:
        access_token: ${{ github.token }}
    - name: Checkout
      uses: actions/checkout@v6.0.2
    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          libclang-dev libsqlite3-dev nlohmann-json3-dev
    - name: Install uv
      uses: astral-sh/setup-uv@v8.1.0
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.config.py }}
    - name: Install dependencies
      # Build the core with libclang so the parser path is exercised by pytest.
      env:
        SKBUILD_CMAKE_DEFINE: CLANGQUILL_WITH_LIBCLANG=ON
      run: uv sync --frozen --extra ci
    - name: run pytest
      run: uv run pytest
    - name: Upload coverage
      uses: codecov/codecov-action@v6
      with:
        env_vars: OS,PYTHON
        fail_ci_if_error: false
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
    - name: build docs
      run: |
        uv sync --frozen --extra docs
        uv run make -C docs html
