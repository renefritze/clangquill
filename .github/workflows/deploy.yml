---
# This workflow will upload a Python Package using Twine when a release is created
# For more information see: https://help.github.com/en/actions/language-and-framework-guides/using-python-with-github-actions#publishing-to-package-registries

name: Upload Python Package

on:
    push:
        tags:
            - v*

jobs:
    pypi:

        runs-on: ubuntu-latest

        permissions:
            id-token: write

        steps:
            - uses: actions/checkout@v6
              with:
                  # full history so setuptools_scm derives the version
                  fetch-depth: 0
            - name: Set up Python
              uses: actions/setup-python@v6
              with:
                  python-version: 3.x
            - name: Build sdist
              run: |
                  python -m pip install --upgrade pip
                  pip install build
                  python -m build --sdist --outdir dist/
            - name: Build manylinux wheels
              # A plain `python -m build --wheel` tags the artefact
              # linux_x86_64, which PyPI rejects. cibuildwheel produces the
              # manylinux-tagged wheels PyPI accepts.
              uses: pypa/cibuildwheel@v3.4
              env:
                  CIBW_BUILD: cp311-* cp312-* cp313-*
                  CIBW_SKIP: '*-musllinux*'
                  CIBW_ARCHS_LINUX: x86_64
                  CIBW_BUILD_VERBOSITY: '1'
                  CIBW_TEST_COMMAND: >-
                      python -c "from clangquill import _core;
                      print(_core.__core_version__, _core.have_libclang())"
              with:
                  output-dir: dist
            - name: Publish distribution 📦 to PyPI
              uses: pypa/gh-action-pypi-publish@release/v1
              with:
                  user: __token__
                  password: ${{ secrets.PYPI_TOKEN }}
    github:
        name: Create Release
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v6
            - name: Create Release
              id: create_release
              uses: actions/create-release@v1
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              with:
                  tag_name: ${{ github.ref }}
                  release_name: ${{ github.ref }}
                  body: |
                      Changes in this Release
                      - First Change
                      - Second Change
                  draft: true
                  prerelease: false
