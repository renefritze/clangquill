---
# Build and publish the package to PyPI when a GitHub release is published.
# Create a release (with its tag) in the GitHub UI / `gh release create` and
# this runs automatically; draft releases do not trigger it until published.
#
# Linux wheels are built per-architecture on native runners (x86_64 + aarch64),
# then a single publish job gathers every artifact and uploads it once.
name: Upload Python Package
on:
  release:
    types: [published]
jobs:
  build_wheels:
    name: Wheels on linux/${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
                # Native runners per arch (arm64 runners are free for public
                # repos) — far faster and more reliable than QEMU emulation.
        include:
          - os: ubuntu-24.04
            arch: x86_64
          - os: ubuntu-24.04-arm
            arch: aarch64
    steps:
      - uses: actions/checkout@v7.0.0
        with:
                  # full history so setuptools_scm derives the version
          fetch-depth: 0
      - name: Build manylinux wheels
              # A plain `python -m build --wheel` tags the artefact
              # linux_<arch>, which PyPI rejects. cibuildwheel produces the
              # manylinux-tagged wheels PyPI accepts.
        uses: pypa/cibuildwheel@v4.1.0
        env:
                  # The core links sqlite3 + nlohmann-json, sourced via vcpkg
                  # inside the manylinux image (apt is unavailable there). vcpkg
                  # is bootstrapped once per container in CIBW_BEFORE_ALL.
                  # libclang is now bundled from the official LLVM release per
                  # ADR-0001 (self-contained libclang.so; needs manylinux_2_34).
          CIBW_BUILD: cp311-* cp312-* cp313-*
          CIBW_SKIP: '*-musllinux*'
          CIBW_ARCHS_LINUX: ${{ matrix.arch }}
          CIBW_BUILD_VERBOSITY: '1'
          CIBW_MANYLINUX_X86_64_IMAGE: manylinux_2_34
          CIBW_MANYLINUX_AARCH64_IMAGE: manylinux_2_34
                  # manylinux_2_28 ships unzip/tar/curl but not zip, which
                  # vcpkg's bootstrap requires; install it (a vcpkg build
                  # prerequisite, not a C++ dependency) before bootstrapping.
          CIBW_BEFORE_ALL_LINUX: >-
            dnf -y install zip unzip tar curl xz &&
            cp {project}/tools/ci/vcpkg-asset-fetch.sh /opt/vcpkg-asset-fetch.sh &&
            chmod +x /opt/vcpkg-asset-fetch.sh &&
            cp {project}/tools/ci/fetch-libclang.sh /opt/fetch-libclang.sh &&
            cp {project}/tools/ci/llvm-version.txt /opt/llvm-version.txt &&
            chmod +x /opt/fetch-libclang.sh &&
            /opt/fetch-libclang.sh /opt/libclang &&
            cp /opt/libclang/LICENSE.TXT {project}/LICENSE-LLVM.txt &&
            git clone https://github.com/microsoft/vcpkg /opt/vcpkg &&
            /opt/vcpkg/bootstrap-vcpkg.sh -disableMetrics
           # cibuildwheel evaluates each CIBW_ENVIRONMENT value through
                  # bashlex, which rejects a bare `NAME=value` (it parses as a
                  # shell assignment), so the toolchain define must be quoted.
                  # sqlite.org also 403s vcpkg's default downloader, so distfiles
                  # go through a browser-User-Agent script (SHA512 still checked).
          CIBW_ENVIRONMENT_LINUX: >-
            VCPKG_ROOT=/opt/vcpkg
            LD_LIBRARY_PATH=/opt/libclang/lib
            SKBUILD_CMAKE_DEFINE="CMAKE_TOOLCHAIN_FILE=/opt/vcpkg/scripts/buildsystems/vcpkg.cmake;CLANGQUILL_WITH_LIBCLANG=ON;LibClang_ROOT=/opt/libclang"
            X_VCPKG_ASSET_SOURCES="clear;x-script,/opt/vcpkg-asset-fetch.sh {url}
            {sha512} {dst}"
          CIBW_TEST_COMMAND: >-
            python -c "from clangquill import _core;
            assert _core.have_libclang();
            print(_core.__core_version__, _core.libclang_version())"
      - uses: actions/upload-artifact@v7.0.1
        with:
          name: wheels-linux-${{ matrix.arch }}
          path: ./wheelhouse/*.whl
  build_sdist:
    name: Source distribution
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.x
      - name: Build sdist
        run: |
          python -m pip install --upgrade pip
          pip install build
          python -m build --sdist --outdir dist/
      - uses: actions/upload-artifact@v7.0.1
        with:
          name: sdist
          path: ./dist/*.tar.gz
  pypi:
    name: Publish to PyPI
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-24.04
    permissions:
      id-token: write
    steps:
      - name: Gather wheels and sdist
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true
      - name: Publish distribution 📦 to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          user: __token__
          password: ${{ secrets.PYPI_TOKEN }}
