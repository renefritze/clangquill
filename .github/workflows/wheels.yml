---
name: wheels

on:
    push:
        branches:
            - main
        tags:
            - v*
    pull_request:
    workflow_dispatch:

jobs:
    build_wheels:
        name: Wheels on ${{ matrix.os }}
        runs-on: ${{ matrix.os }}
        strategy:
            fail-fast: false
            matrix:
                os: [ubuntu-latest]
        steps:
            - uses: actions/checkout@v6
              with:
                  # full history so setuptools_scm derives the version
                  fetch-depth: 0

            - name: Build manylinux wheels
              uses: pypa/cibuildwheel@v2.21
              env:
                  # M1 builds the stub backend in the manylinux image; real
                  # libclang sourcing is handled by the spike (#4). The build is
                  # therefore self-contained and needs no extra system deps.
                  CIBW_BUILD: cp311-* cp312-* cp313-*
                  CIBW_SKIP: '*-musllinux*'
                  CIBW_ARCHS_LINUX: x86_64
                  CIBW_BUILD_VERBOSITY: '1'
                  CIBW_TEST_COMMAND: >-
                      python -c "from clangquill import _core;
                      print(_core.__core_version__, _core.have_libclang())"

            - uses: actions/upload-artifact@v4
              with:
                  name: wheels-${{ matrix.os }}
                  path: ./wheelhouse/*.whl

    build_sdist:
        name: Source distribution
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
              with:
                  fetch-depth: 0
            - name: Install uv
              uses: astral-sh/setup-uv@v7
            - name: Build sdist
              run: uv build --sdist
            - uses: actions/upload-artifact@v4
              with:
                  name: sdist
                  path: ./dist/*.tar.gz
