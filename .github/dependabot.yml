---
# Configuration: https://dependabot.com/docs/config-file/
# Docs: https://docs.github.com/en/github/administering-a-repository/keeping-your-dependencies-updated-automatically

version: 2

updates:
    - package-ecosystem: uv
      directory: /
      schedule:
          interval: weekly
          day: monday
      cooldown:
          default-days: 6
      groups:
          python-dependencies:
              patterns:
                  - "*"
      allow:
          - dependency-type: all
      commit-message:
          prefix: ':arrow_up:'
      open-pull-requests-limit: 50

    - package-ecosystem: github-actions
      directory: /
      schedule:
          interval: weekly
          day: monday
      cooldown:
          default-days: 6
      groups:
          github-actions:
              patterns:
                  - "*"
      allow:
          - dependency-type: all
      commit-message:
          prefix: ':arrow_up:'
      open-pull-requests-limit: 50
